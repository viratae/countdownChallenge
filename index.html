<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Countdown Challenge</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
        <script src="https://kit.fontawesome.com/b8659964f9.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="modal">
            <div class="modalContent">
                <span id="closeModal">&times;</span>
                <form id="customizeForm" autocomplete="off">
                    <div>
                        <label for="player1Name">Player 1 Name</label>
                        <input id="player1Name" value="Player 1" type="text" />
                    </div>
                    <div>
                        <label for="player2Name">Player 2 Name</label>
                        <input id="player2Name" value="Player 2" type="text" />
                    </div>
                    <div>
                        <label for="countdownNumber">What are we counting down from?</label>
                        <input id="countdownNumber" value="50" type="number" />
                    </div>
                    <div>
                        <label for="countdownMin">What's the minimum value we'll countdown by?</label>
                        <input id="countdownMin" value="1" type="number" />
                    </div>
                    <div>
                        <label for="countdownMax">What's the maximum value we'll countdown by?</label>
                        <input id="countdownMax" value="6" type="number" />
                    </div>
                    <div id="buttonContainer">
                        <button id="submitButton" type="submit">Customize</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="header">
            <div id="left">
                <i class="fa-solid fa-hourglass-start"></i>
                <button id="customizeButton">Customize</button>
            </div>
            <div id="middle">
                <h1>Countdown Challenge</h1>
            </div>
        </div>
        <div id="turnSection">
            <div id="turnContainer">
                <h3 id="turnIndicatorText">Turn: Player 1</h3>
                <button id="resetButton"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <button id="playButton"><i class="fa-solid fa-dice-two"></i></button>
        </div>
        <div id="incrementContainer">
            <h6 id="countdownMinText">Min: 1</h6>
            <h6 id="countdownMaxText">Max: 6</h6>
        </div>
        <div id="gridContainer">
            <div id="left">
                <h4 id="player1Text">Player 1</h4>
                <h5>Countdown Taken:</h5>
                <span id="player1TakenText">0</span>
            </div>
            <div id="middle">
                <div id="countdownNumberText">50</div>
            </div>
            <div id="right">
                <h4 id="player2Text">Player 2</h4>
                <h5>Countdown Taken:</h5>
                <span id="player2TakenText">0</span>
            </div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
